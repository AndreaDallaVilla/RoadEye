<!DOCTYPE html>
<html lang="it" xmlns:href="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RoadEye</title>
    <link rel="stylesheet" href="/styles.css?v=0.1.7">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/@googlemaps/extended-component-library/0.6.11/index.min.js"></script>
    <script defer src="/app.js?v=0.1.7"></script>
  </head>
  <body>
    <div class="phone-app">
      <header class="app-header">
        <button class="icon-button" id="menu-toggle" type="button" aria-label="Apri menu">☰</button>
        <div class="brand-lockup">
          <img class="brand-logo" src="/assets/roadeye-logo.png" alt="RoadEye">
        </div>
        <p class="section-status" id="header-section-title">Home</p>
        <button class="auth-action-button" id="header-auth-button" type="button">Accedi</button>
      </header>

      <aside class="drawer" id="drawer" aria-label="Menu applicazione">
        <div class="drawer-head">
          <strong id="drawer-user">Ciao, visitatore</strong>
          <button class="icon-button" id="menu-close" type="button" aria-label="Chiudi menu">×</button>
        </div>
        <nav>
          <button type="button" data-view="home">Home</button>
          <button type="button" data-view="report">Nuova segnalazione</button>
        </nav>
      </aside>

      <main>
        <section class="screen active" id="home-screen">
          <div id="home-map-host">
            <div class="map-panel" id="shared-map-panel">
              <div class="search-row">
                <div class="map-search-host">
                  <input id="map-search" type="search" placeholder="Cerca in Provincia di Trento" autocomplete="off">
                </div>
              </div>

              <div class="chip-row" aria-label="Filtri segnalazioni">
                <button type="button">Trentino</button>
                <button type="button">Tutte</button>
                <button type="button">Incidenti</button>
                <button type="button">Autovelox</button>
                <button type="button">Pericolo bordo strada</button>
                <button type="button">Eventi</button>
                <button type="button">Cantieri</button>
                <button type="button">Ferimento animali</button>
              </div>

              <div class="map-box">
                <gmp-map id="roadeye-map">
                  <gmp-advanced-marker></gmp-advanced-marker>
                </gmp-map>
                <div class="map-status" id="maps-status" hidden></div>
              </div>
            </div>
          </div>

    <section class="news-box">
      <h2>Ultime notizie vicine a te</h2>
      <div class="lista-annunci"></div>
    </section>
    
    <div class="detail-modal" id="modal-dettaglio">
      <div class="detail-modal-panel">
        <button class="detail-modal-close" id="detail-modal-close" type="button">
          Chiudi
        </button>
    
        <h2 id="det-topic"></h2>
        <p><strong>Nome Autore:</strong> <span id="det-nomAut"></span></p>
        <p><strong>Posizione:</strong> <span id="det-pos"></span></p>
        <div class="detail-map" id="det-map" aria-label="Mappa posizione annuncio"></div>
        <p><strong>Gravità:</strong> <span id="det-gravita"></span></p>
        <p><strong>Descrizione:</strong> <span id="det-desc"></span></p>
        <p><small>ID: <span id="det-id"></span></small></p>
      </div>
    </div>
    </section>
    </section>

        <section class="screen" id="report-screen">
          <div class="report-step active" id="report-topic-step">
            <div class="category-grid">
              <button type="button" data-category="Incidente stradale">Incidente stradale <span>!</span></button>
              <button type="button" data-category="Cantiere stradale">Cantiere stradale <span>#</span></button>
              <button type="button" data-category="Evento">Evento <span>*</span></button>
              <button type="button" data-category="Ferimento animali">Ferimento animali <span>+</span></button>
              <button type="button" data-category="Pericolo bordo strada">Pericolo bordo strada <span>^</span></button>
              <button type="button" data-category="Autovelox">Autovelox <span>@</span></button>
            </div>
            <button class="outline-button full" id="report-topics-back-home" type="button">Indietro</button>
          </div>

          <form class="wire-form report-step" id="report-form">
            <label>
              Posizione
              <input id="report-position" name="posizione" type="text" placeholder="Premi sulla mappa o scrivi un indirizzo" required>
              <input id="report-latitude" name="latitudine" type="hidden">
              <input id="report-longitude" name="longitudine" type="hidden">
            </label>
            <div id="report-map-host"></div>
            <label>
              Topic
              <input id="report-category" name="topic" type="text" readonly required>
            </label>
            <label>
              Descrizione
              <textarea name="descrizione" rows="4" placeholder="Descrivi il problema"></textarea>
            </label>
            <div class="button-row">
              <button class="outline-button" id="report-back-to-topics" type="button">Indietro</button>
              <button class="solid-button report-inline-submit" type="submit">Pubblica</button>
            </div>
          </form>

          <dialog class="severity-dialog" id="severity-dialog" aria-labelledby="severity-title">
            <form method="dialog" class="wire-form">
              <h2 id="severity-title">Scegli gravita'</h2>
              <label class="severity-control">
                <span id="severity-label">Media</span>
                <input id="severity-range" name="gravita" type="range" min="1" max="4" value="2" step="1">
              </label>
              <div class="button-row">
                <button class="outline-button" value="cancel" type="submit">Indietro</button>
                <button class="solid-button" id="confirm-severity" type="button">Pubblica</button>
              </div>
            </form>
          </dialog>
        </section>

        <section class="screen auth-screen" id="auth-screen">
          <div class="auth-tabs">
            <button class="active" id="login-tab" type="button" data-auth-panel="login">Accedi</button>
            <button id="register-tab" type="button" data-auth-panel="register">Registrati</button>
          </div>

          <div class="auth-panel active" id="login-form">
            <div class="login-mode-tabs" aria-label="Tipo accesso">
              <button class="active" type="button" data-login-mode="user">Utente</button>
              <button type="button" data-login-mode="entity">Ente pubblico</button>
            </div>

            <form class="wire-form login-mode-panel active" id="user-login-form" data-login-panel="user">
              <label>
                Email
                <input name="email" type="email" autocomplete="email" required>
              </label>
              <label>
                Password
                <span class="password-field">
                  <input name="password" type="password" autocomplete="current-password" required>
                  <button class="password-toggle" type="button" aria-label="Mostra password" aria-pressed="false">
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </span>
              </label>
              <button class="solid-button full" type="submit">Accedi</button>
              <button class="link-button" type="button" data-auth-panel="forgot-password">Hai dimenticato la password?</button>
            </form>

            <form class="wire-form login-mode-panel" id="entity-login-form" data-login-panel="entity">
              <label>
                Denominazione
                <select name="publicEntityId" id="public-entity-select" required>
                  <option value="">Caricamento enti...</option>
                </select>
              </label>
              <label>
                PEC
                <input name="pec" type="email" autocomplete="email" required>
              </label>
              <label>
                Codice IPA
                <input name="codiceIpa" type="text" required>
              </label>
              <label id="entity-unique-code-row">
                Codice univoco
                <input name="codiceUnivoco" type="text">
              </label>
              <label>
                Password
                <span class="password-field">
                  <input name="password" type="password" autocomplete="current-password" required>
                  <button class="password-toggle" type="button" aria-label="Mostra password" aria-pressed="false">
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </span>
              </label>
              <button class="solid-button full" type="submit">Accedi come ente</button>
            </form>
          </div>

          <form class="wire-form auth-panel" id="register-form">
            <input name="tipoUtente" type="hidden" value="Utente Registrato">
            <div class="registered-fields">
              <label>Nome* <input name="nome" type="text" data-registered-required required></label>
              <label>Cognome* <input name="cognome" type="text" required></label>
              <label>nickname <input name="nomeUtentePubblico" type="text"></label>
              <label>Data di nascita (sopra i 14 anni)* <input name="dataNascita" type="date" data-registered-required required></label>
              <label>Luogo di nascita* <input id="birth-place" name="luogoNascita" type="text" autocomplete="address-level2" placeholder="Cerca comune o citta'" required></label>
              <label>
                Sesso*
                <select name="sesso" required>
                  <option value="" selected>Seleziona</option>
                  <option value="Femmina">Femmina</option>
                  <option value="Maschio">Maschio</option>
                </select>
              </label>
              <label class="phone-field">
                Numero di telefono
                <span>
                  <select name="nazioneTelefono" aria-label="Nazione prefisso telefono">
                    <option value="">Caricamento nazioni...</option>
                  </select>
                  <input name="numeroTelefono" type="tel" inputmode="tel" autocomplete="tel" placeholder="Numero">
                </span>
              </label>
            </div>

            <label>
              Codice fiscale*
              <input name="codiceFiscale" type="text" required>
            </label>
            <label>
              Email*
              <span class="input-action-row">
                <input id="register-email" name="email" type="email" autocomplete="email" required>
                <button class="outline-button" id="send-email-verification" type="button">Verifica</button>
              </span>
            </label>
            <label id="email-verification-row" hidden>
              Codice ricevuto via email*
              <input name="codiceVerificaEmail" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code">
            </label>
            <label>
              Password*
              <span class="password-field">
                <input name="password" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" aria-label="Mostra password" aria-pressed="false">
                  <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </span>
              <span class="password-strength" data-password-strength role="status" aria-live="polite">
                <span class="strength-icon" aria-hidden="true"></span>
                <span class="strength-meter" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span class="strength-text">Inserisci una password</span>
              </span>
            </label>
            <label class="check-row">
              <input name="notificheAttive" type="checkbox" checked>
              Notifiche attive
            </label>
            <label class="check-row gdpr-consent">
              <input name="consensoTrattamentoDati" type="checkbox" required>
              <span>
                Accetto il trattamento dei dati personali in linea con
                <a href="https://eur-lex.europa.eu/legal-content/IT/TXT/?uri=CELEX:32016R0679" target="_blank" rel="noopener noreferrer">GDPR (General Data Protection Regulation - Regolamento UE 2016/679)</a>
                , garantito dall'implementazione dello standard di sicurezza
                <a href="https://en.wikipedia.org/wiki/ISO/IEC_27001" target="_blank" rel="noopener noreferrer">ISO 27001</a>
              </span>
            </label>
            <button class="solid-button full" type="submit">Salva</button>
          </form>

          <form class="wire-form auth-panel" id="forgot-password-form">
            <label>
              Email associata all'account
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <button class="solid-button full" type="submit">Invia codice</button>
            <button class="link-button" type="button" data-auth-panel="login">Torna all'accesso</button>
          </form>

          <form class="wire-form auth-panel" id="reset-password-form">
            <label>
              Email
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              Codice ricevuto via email
              <input name="codiceReset" type="text" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code" required>
            </label>
            <label>
              Nuova password
              <span class="password-field">
                <input name="password" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" aria-label="Mostra password" aria-pressed="false">
                  <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </span>
              <span class="password-strength" data-password-strength role="status" aria-live="polite">
                <span class="strength-icon" aria-hidden="true"></span>
                <span class="strength-meter" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span class="strength-text">Inserisci una password</span>
              </span>
            </label>
            <button class="solid-button full" type="submit">Aggiorna password</button>
            <button class="link-button" type="button" data-auth-panel="login">Torna all'accesso</button>
          </form>

          <p class="form-message" id="auth-message" role="status"></p>
        </section>
      </main>

      <div class="toast-popup" id="app-toast" role="status" aria-live="polite" hidden></div>
      <nav class="bottom-actions">
        <button id="bottom-home-submit" type="button" data-view="home">HOME</button>
        <button class="primary-action" id="bottom-primary-action" type="button" data-view="report">+</button>
      </nav>
    </div>
  </body>
</html>
