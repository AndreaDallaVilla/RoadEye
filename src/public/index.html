<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RoadEye</title>
    <link rel="stylesheet" href="/styles.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/@googlemaps/extended-component-library/0.6.11/index.min.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <div class="phone-app">
      <header class="app-header">
        <button class="icon-button" id="menu-toggle" type="button" aria-label="Apri menu">☰</button>
        <div class="brand-lockup">
          <img class="brand-logo" src="/assets/roadeye-logo.png" alt="" aria-hidden="true">
          <div>
            <p id="header-section-title">Home</p>
            <h1>RoadEye</h1>
          </div>
        </div>
        <button class="auth-action-button" id="header-auth-button" type="button">Accedi</button>
      </header>

      <aside class="drawer" id="drawer" aria-label="Menu applicazione">
        <div class="drawer-head">
          <strong id="drawer-user">Ciao, visitatore</strong>
          <button class="icon-button" id="menu-close" type="button" aria-label="Chiudi menu">×</button>
        </div>
        <nav>
          <button type="button" data-view="home">Home</button>
          <button type="button" data-view="report">Nuova segnalazione</button>
        </nav>
      </aside>

      <main>
        <section class="screen active" id="home-screen">
          <div class="search-row">
            <div class="map-search-host">
              <gmpx-place-picker placeholder="Cerca in Provincia di Trento"></gmpx-place-picker>
            </div>
          </div>

          <div class="chip-row" aria-label="Filtri segnalazioni">
            <button type="button">Trentino</button>
            <button type="button">Tutte</button>
            <button type="button">Incidenti</button>
            <button type="button">Autovelox</button>
            <button type="button">Pericolo bordo strada</button>
            <button type="button">Eventi</button>
            <button type="button">Cantieri</button>
            <button type="button">Ferimento animali</button>
          </div>

          <div class="map-box">
            <gmp-map id="roadeye-map">
              <gmp-advanced-marker></gmp-advanced-marker>
            </gmp-map>
            <div class="map-status" id="maps-status">Caricamento mappa</div>
          </div>

          <section class="news-box">
            <h2>Ultime notizie vicine a te</h2>
            <ul>
              <li><span>!</span><strong>Incidente tra autoveicoli - Trento</strong></li>
              <li><span>!</span><strong>Cantiere stradale - Rovereto</strong></li>
              <li><span>!</span><strong>Percorso con pericolo - Pergine</strong></li>
            </ul>
          </section>
        </section>

        <section class="screen" id="report-screen">
          <div class="screen-head">
            <button class="link-button" type="button" data-view="home">Mappa</button>
            <button class="icon-button" type="button" data-view="home" aria-label="Chiudi">×</button>
          </div>

          <h2>Aggiungi segnalazione</h2>
          <div class="category-grid">
            <button type="button" data-category="Incidente tra autoveicoli">Incidente tra autoveicoli <span>🚗</span></button>
            <button type="button" data-category="Cantiere stradale">Cantiere stradale <span>🚧</span></button>
            <button type="button" data-category="Evento">Evento <span>🎙</span></button>
            <button type="button" data-category="Ferimento animale">Ferimento animale <span>⚠</span></button>
            <button type="button" data-category="Percorso bordo strada">Percorso bordo strada <span>△</span></button>
          </div>

          <form class="wire-form" id="report-form">
            <label>
              Posizione
              <input id="report-position" name="posizione" type="text" readonly value="Seleziona un luogo dalla mappa">
            </label>
            <label>
              Categoria
              <input id="report-category" name="categoria" type="text" readonly>
            </label>
            <label>
              Descrizione
              <textarea name="descrizione" rows="4" placeholder="Descrivi il problema"></textarea>
            </label>
            <label>
              Gravita'
              <input name="gravita" type="range" min="1" max="5" value="3">
            </label>
            <div class="button-row">
              <button class="outline-button" type="button" data-view="home">Annulla</button>
              <button class="solid-button" type="submit">Invia segnalazione</button>
            </div>
          </form>
        </section>

        <section class="screen auth-screen" id="auth-screen">
          <div class="auth-tabs">
            <button class="active" id="login-tab" type="button" data-auth-panel="login">Accedi</button>
            <button id="register-tab" type="button" data-auth-panel="register">Registrati</button>
          </div>

          <div class="auth-panel active" id="login-form">
            <div class="login-mode-tabs" aria-label="Tipo accesso">
              <button class="active" type="button" data-login-mode="user">Utente</button>
              <button type="button" data-login-mode="entity">Ente pubblico</button>
            </div>

            <form class="wire-form login-mode-panel active" id="user-login-form" data-login-panel="user">
              <label>
                Email
                <input name="email" type="email" autocomplete="email" required>
              </label>
              <label>
                Password
                <span class="password-field">
                  <input name="password" type="password" autocomplete="current-password" required>
                  <button class="password-toggle" type="button" aria-label="Mostra password" aria-pressed="false">
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </span>
              </label>
              <button class="solid-button full" type="submit">Accedi</button>
            </form>

            <form class="wire-form login-mode-panel" id="entity-login-form" data-login-panel="entity">
              <label>
                Denominazione
                <select name="publicEntityId" id="public-entity-select" required>
                  <option value="">Caricamento enti...</option>
                </select>
              </label>
              <label>
                PEC
                <input name="pec" type="email" autocomplete="email" required>
              </label>
              <label>
                Codice IPA
                <input name="codiceIpa" type="text" required>
              </label>
              <label id="entity-unique-code-row">
                Codice univoco
                <input name="codiceUnivoco" type="text">
              </label>
              <label>
                Password
                <span class="password-field">
                  <input name="password" type="password" autocomplete="current-password" required>
                  <button class="password-toggle" type="button" aria-label="Mostra password" aria-pressed="false">
                    <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                      <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </span>
              </label>
              <button class="solid-button full" type="submit">Accedi come ente</button>
            </form>
          </div>

          <form class="wire-form auth-panel" id="register-form">
            <input name="tipoUtente" type="hidden" value="Utente Registrato">
            <div class="registered-fields">
              <label>Nome* <input name="nome" type="text" data-registered-required required></label>
              <label>Cognome* <input name="cognome" type="text" required></label>
              <label>nickname <input name="nomeUtentePubblico" type="text"></label>
              <label>Data di nascita (sopra i 14 anni)* <input name="dataNascita" type="date" data-registered-required required></label>
              <label>
                Sesso*
                <select name="sesso">
                  <option value="">Seleziona</option>
                  <option value="Femmina">Femmina</option>
                  <option value="Maschio">Maschio</option>
                </select>
              </label>
              <label>Numero di telefono <input name="numeroTelefono" type="tel"></label>
            </div>

            <label>
              Codice fiscale*
              <input name="codiceFiscale" type="text" required>
            </label>
            <label>
              Email*
              <input name="email" type="email" autocomplete="email" required>
            </label>
            <label>
              Password*
              <span class="password-field">
                <input name="password" type="password" autocomplete="new-password" required>
                <button class="password-toggle" type="button" aria-label="Mostra password" aria-pressed="false">
                  <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
                    <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6S2 12 2 12Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </span>
              <span class="password-strength" data-password-strength role="status" aria-live="polite">
                <span class="strength-icon" aria-hidden="true"></span>
                <span class="strength-meter" aria-hidden="true">
                  <span></span>
                  <span></span>
                  <span></span>
                  <span></span>
                </span>
                <span class="strength-text">Inserisci una password</span>
              </span>
            </label>
            <label class="check-row">
              <input name="notificheAttive" type="checkbox" checked>
              Notifiche attive
            </label>
            <button class="solid-button full" type="submit">Salva</button>
          </form>

          <p class="form-message" id="auth-message" role="status"></p>
        </section>
      </main>

      <nav class="bottom-actions">
        <button type="button" data-view="home">HOME</button>
        <button class="primary-action" type="button" data-view="report">+</button>
      </nav>
    </div>
  </body>
</html>
